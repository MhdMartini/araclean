[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "araclean"
version = "0.1.0"
description = "Arabic text normalization and cleaning — pure-Python, composable, reproducible."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Mohamed Martini", email = "mohamedmartini1991@gmail.com" }]
keywords = ["arabic", "nlp", "normalization", "text", "preprocessing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Natural Language :: Arabic",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
# Lean core (ADR-0006): pydantic v2 is the only runtime dependency (ADR-0003).
# Any GPL-licensed dependency stays isolated behind an extra to protect the MIT core.
dependencies = ["pydantic>=2"]

[project.urls]
Homepage = "https://github.com/MhdMartini/araclean"
Repository = "https://github.com/MhdMartini/araclean"
Issues = "https://github.com/MhdMartini/araclean/issues"

# Extras are declared now and populated by later slices; none pull a dependency
# into the core. `all` aggregates them, so it grows automatically as they fill in.
[project.optional-dependencies]
cli = []
pandas = []
polars = []
all = ["araclean[cli]", "araclean[pandas]", "araclean[polars]"]

# Development tooling (PEP 735). `uv sync` installs this group by default.
[dependency-groups]
dev = [
    "ruff>=0.6",
    "mypy>=1.11",
    "pyright>=1.1.380",
    "pytest>=8",
    "hypothesis>=6",
    "syrupy>=4",
    "pre-commit>=3.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/araclean"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # modernize syntax
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
]

[tool.ruff.lint.isort]
known-first-party = ["araclean"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["src", "tests"]
plugins = ["pydantic.mypy"]

[tool.pyright]
include = ["src", "tests"]
typeCheckingMode = "strict"
pythonVersion = "3.12"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
