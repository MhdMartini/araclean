# Docs site. Built with `uv run mkdocs build --strict` (the docs dependency group).
# `strict: true` turns every mkdocs warning — a broken link, a page missing from the nav — into a
# build failure, so the published site can't rot. The per-profile pages, the glossary page, the
# abbreviations include and the CLI reference are GENERATED by `docs_gen.py` from the source of
# truth (araclean + GLOSSARY.md + the Typer app) and kept in sync by tests/test_docs.py — never
# hand-edit them. Every `>>>` example on every page runs as a doctest in tests/test_docs.py.
site_name: araclean
site_description: Arabic text normalization and cleaning — pure-Python, composable, reproducible.
site_url: https://mhdmartini.github.io/araclean/
repo_url: https://github.com/MhdMartini/araclean
repo_name: MhdMartini/araclean
copyright: MIT-licensed. Arabic-primary terminology (ADR-0007).
strict: true

theme:
  name: material
  # Holds the ONE template override: main.html redefines mkdocs-material's `outdated` block so a
  # reader who lands on any non-default version (see `extra.version.default` below) gets a banner
  # linking back to the latest docs. The override renders on the mike-deployed site only; a plain
  # `mkdocs build --strict` picks up the dir without complaint.
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Versioned docs. `mike` (run only in the CI `docs-deploy` job on a release
# tag) publishes each version under gh-pages and writes a versions.json; this `provider: mike` tells
# mkdocs-material to render the version-selector dropdown that reads it. It is theme config only — a
# plain `mkdocs build --strict` neither needs `mike` installed nor warns when versions.json is absent.
# `default: latest` names the alias the CI `docs-deploy` job moves on every release
# (`mike deploy --update-aliases "$version" latest`): the theme shows the `overrides/main.html`
# "you're viewing an old version" banner on any version whose aliases don't include it.
extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Profiles:
      - Overview: profiles/index.md
      - LIGHT: profiles/light.md
      - SEARCH: profiles/search.md
      - ML: profiles/ml.md
      - SOCIAL: profiles/social.md
      - CLASSICAL: profiles/classical.md
  - Guides:
      - Offset-preserving normalization: guides/offset-preserving.md
      - Command line: guides/cli.md
      - pandas & polars: guides/dataframes.md
      - Tuning profiles: guides/tuning-profiles.md
      - Composing pipelines: guides/composing-pipelines.md
      - Writing custom steps: guides/custom-steps.md
      - Reproducible preprocessing: guides/reproducibility.md
      - Stopword removal: guides/stopwords.md
  - Concepts:
      - Why araclean: concepts/why-araclean.md
      - The safety contract: concepts/safety.md
      - Architecture & performance: concepts/architecture.md
  - Reference:
      - Python API: reference.md
      - CLI: reference/cli.md
      - Glossary: glossary.md
  - FAQ: faq.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  # Auto-append the GENERATED glossary abbreviations to every page, so each Arabic term shows its
  # English gloss on hover wherever it appears (ADR-0007). `check_paths` makes a missing include a
  # hard error under --strict instead of a silent no-tooltips build.
  - pymdownx.snippets:
      base_path: [docs]
      auto_append: [includes/abbreviations.md]
      check_paths: true

# These live under docs/ but are not site pages: the ADRs and the competitive landscape are internal
# design records (not part of the user-facing site scope), and includes/ holds the auto-appended
# abbreviations partial. Excluding them keeps a --strict build clean (no "not in nav" warnings)
# while snippets still reads the abbreviations file from disk.
exclude_docs: |
  adr/
  competitive-landscape.md
  includes/
